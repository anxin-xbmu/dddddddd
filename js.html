<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JS基础练习</title>
</head>
<body>
    <h1>JavaScript 基础练习</h1>
    <script>
        // 1.变量定义
        let name = "张三";
        const age = 18;
        var num = 100;

        // 2.变量类型
        console.log(typeof name);
        console.log(typeof age);

        // 3.表达式
        let a = 10;
        let b = 20;
        let c = a + b;
        console.log(c);

        // 4.流程控制
        if(age >= 18){
            console.log("成年");
        }else{
            console.log("未成年");
        }

        // 5.函数
        function add(x,y){
            return x + y;
        }
        console.log(add(2,3));
    </script>
</body>
</html>
